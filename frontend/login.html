<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - ATS AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="api.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #0b0b0c;
  color: white;
  margin: 0;
  overflow: hidden;
}

/* 🔥 THE ORIGINAL BLUE GRID UI 🔥 */
.hero-grid {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: -1;
}
.hero-grid::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background-image:
    linear-gradient(rgba(59,130,246,0.35) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.35) 1px, transparent 1px);
  background-size: 30px 30px;
  filter: drop-shadow(0 0 10px rgba(59,130,246,0.5));
}

/* Glass Navbar */
nav.custom-nav {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 1000px;
  z-index: 100;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 32px;
  width: 100%;
  max-width: 400px;
}

.input {
  width: 100%;
  padding: 12px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: white;
}
.input:focus { outline: none; border-color: rgba(59,130,246,0.5); }

.btn {
  width: 100%;
  background: white;
  color: black;
  padding: 12px;
  border-radius: 10px;
  font-weight: 500;
  transition: 0.2s;
  cursor: pointer;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(255,255,255,0.1); }
</style>
</head>

<body class="min-h-screen flex items-center justify-center">

<div class="hero-grid"></div>

<!-- NAVBAR (WITH HOME & LOGOUT) -->
<nav class="custom-nav">
  <h1 class="text-md font-semibold text-white">DeepCV Analyzer</h1>
  <div class="flex space-x-8 text-sm font-medium">
    <a href="index.html" class="text-gray-400 hover:text-white transition">Home</a>
    <button onclick="logout()" class="text-gray-400 hover:text-white transition">Logout</button>
  </div>
</nav>

<div class="card mt-12">
    <h2 class="text-2xl font-bold mb-2 text-center">Login</h2>
    <p class="text-gray-400 text-center mb-8">Access your deep analysis</p>

    <div class="space-y-4">
      <div>
        <label class="text-xs text-gray-500 uppercase tracking-widest">Username</label>
        <input type="text" id="username" class="input mt-1" placeholder="Enter username">
      </div>
      <div>
        <label class="text-xs text-gray-500 uppercase tracking-widest">Password</label>
        <input type="password" id="password" class="input mt-1" placeholder="••••••••">
      </div>
      <button onclick="login()" class="btn">Sign In</button>
    </div>

    <div class="text-center mt-6 text-sm text-gray-400">
      Don’t have an account? <a href="signup.html" class="text-white underline">Sign up</a>
    </div>
</div>

<script>
async function login() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;
  if (!u || !p) return alert("Fill all fields");

  try {
    const res = await apiCall("/api/auth/login", { 
        method: "POST", 
        body: { username: u, password: p } 
    });
    localStorage.setItem("user_id", res.user_id);
    window.location.href = "upload.html";
  } catch (e) { alert(e.message); }
}

function logout() {
  localStorage.removeItem("user_id");
  window.location.href = "login.html";
}
</script>

</body>
</html>

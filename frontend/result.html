<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATS Result</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center">

  <h1 class="text-4xl font-bold mb-6">ATS Analysis Result</h1>

  <!-- Score -->
  <p id="scoreText" class="text-2xl text-green-400 mb-10"></p>

  <!-- Graph -->
  <div class="w-full max-w-2xl bg-gray-900 p-6 rounded-2xl">
    <canvas id="chart"></canvas>
  </div>

  <!-- Back Button -->
  <a href="index.html" class="mt-8 bg-white text-black px-6 py-2 rounded-lg">
    Analyze Another Resume
  </a>

  <!-- JS -->
  <script>
    // Get data from URL
    const params = new URLSearchParams(window.location.search);

    const score = params.get("score");
    const skills = params.get("skills");
    const experience = params.get("experience");
    const education = params.get("education");
    const projects = params.get("projects");

    document.getElementById("scoreText").textContent =
      "ATS Score: " + score + "%";

    // Create graph
    const ctx = document.getElementById("chart");

    new Chart(ctx, {
      type: "bar",
      data: {
        labels: ["Skills", "Experience", "Education", "Projects"],
        datasets: [{
          label: "ATS Breakdown",
          data: [skills, experience, education, projects],
        }]
      },
      options: {
        scales: {
          y: {
            beginAtZero: true,
            max: 100
          }
        }
      }
    });
  </script>

</body>
</html>

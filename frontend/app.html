<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATS AI - Resume Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="runtime-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0b0c;
      color: white;
    }
    .bg-glow {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(255,255,255,0.06), transparent 40%);
      z-index: -1;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
    }
    .btn {
      background: white;
      color: black;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 500;
      transition: 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.18);
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="bg-glow"></div>
  <nav class="flex justify-between items-center px-10 py-6">
    <h1 class="text-2xl font-bold">ATS AI - Project</h1>
    <button onclick="logout()" class="text-sm rounded-lg border border-gray-700 px-4 py-2">Logout</button>
  </nav>

  <main class="max-w-4xl mx-auto p-6 space-y-6">
    <h2 class="text-3xl font-bold">Upload Resume</h2>

    <div class="card space-y-5">
      <div class="p-4 border border-dashed border-gray-600 rounded-xl bg-gray-900 mx-auto text-center hover:bg-gray-800 transition">
        <label for="resume" class="cursor-pointer block text-lg font-semibold text-gray-300 mb-2">Select your Resume PDF</label>
        <input id="resume" type="file" accept=".pdf" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-white file:text-black hover:file:bg-gray-200 cursor-pointer">
      </div>

      <button onclick="analyze()" id="scanBtn" class="btn w-full flex justify-center items-center">
        <span>Scan Resume ✨</span>
      </button>
    </div>

    <!-- Output UI -->
    <section id="result" class="hidden space-y-6">
      <div class="card text-center bg-gray-900 border-green-900 border">
        <h3 class="text-xl font-bold text-gray-400">Inferred Job Role</h3>
        <p id="inferredRole" class="text-3xl font-bold text-green-400 mt-2"></p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- ATS Score Card -->
        <div class="card text-center flex flex-col justify-center items-center py-8">
          <p class="text-gray-400 mb-2">ATS Score</p>
          <div class="text-5xl font-bold text-white"><span id="atsScore">0</span></div>
        </div>
        <!-- JD Match Card -->
        <div class="card text-center flex flex-col justify-center items-center py-8">
          <p class="text-gray-400 mb-2">Job Match Compatibility</p>
          <div class="text-5xl font-bold text-blue-400"><span id="jdMatch">0</span></div>
        </div>
      </div>

      <!-- Skills Section -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="card">
          <h4 class="text-lg font-bold text-gray-300 mb-3 block border-b border-gray-800 pb-2">Matched Skills ✅</h4>
          <p id="matchedSkills" class="text-green-300 leading-relaxed"></p>
        </div>
        <div class="card">
          <h4 class="text-lg font-bold text-gray-300 mb-3 block border-b border-gray-800 pb-2">Missing Skills ❌</h4>
          <p id="missingSkills" class="text-red-400 leading-relaxed"></p>
        </div>
      </div>

      <!-- Detail & Recs -->
      <div class="card">
        <h4 class="text-lg font-bold text-gray-300 mb-3 block border-b border-gray-800 pb-2">Improvements & Recommendations 💡</h4>
        <ul id="recommendations" class="list-disc list-inside text-gray-400 space-y-2"></ul>
      </div>
      
      <div class="card">
        <h4 class="text-lg font-bold text-gray-300 mb-3 block border-b border-gray-800 pb-2">Section Quality Breakdown</h4>
        <div id="sectionQuality" class="grid grid-cols-3 gap-2 text-center text-sm font-semibold"></div>
      </div>
    </section>
  </main>

  <script>
    function getApiBase() {
      if (window.RUNTIME_CONFIG && window.RUNTIME_CONFIG.API_BASE) {
        return window.RUNTIME_CONFIG.API_BASE;
      }
      return window.location.origin; // Same-origin for single-service deployments
    }
    const API_BASE = getApiBase();

    const userId = localStorage.getItem("ats_user_id");
    if (!userId) {
      window.location.href = "index.html";
    }

    function logout() {
      localStorage.removeItem("ats_user_id");
      localStorage.removeItem("ats_username");
      window.location.href = "index.html";
    }

    async function analyze() {
      const file = document.getElementById("resume").files[0];
      const btn = document.getElementById("scanBtn");

      if (!file) {
        alert("Please upload a PDF.");
        return;
      }

      btn.textContent = "Scanning...";
      btn.disabled = true;

      const formData = new FormData();
      formData.append("user_id", userId);
      formData.append("file", file);

      try {
        const res = await fetch(`${API_BASE}/api/analyze`, {
          method: "POST",
          body: formData
        });
        const data = await res.json();
        
        btn.innerHTML = "<span>Scan Resume ✨</span>";
        btn.disabled = false;

        if (!res.ok) {
          alert(data.detail || "Analysis failed.");
          return;
        }

        document.getElementById("result").classList.remove("hidden");
        document.getElementById("inferredRole").textContent = data.inferred_role || "Unknown Role";
        document.getElementById("atsScore").textContent = `${data.ats_score}%`;
        document.getElementById("jdMatch").textContent = `${data.jd_match}%`;
        
        // Render sections beautifully
        const sq = data.section_quality || {};
        const sqHtml = Object.keys(sq).map(k => {
            const val = sq[k];
            const color = val === "Good" ? "text-green-400" : (val === "Missing" ? "text-red-400" : "text-yellow-400");
            return `<div class="p-3 bg-gray-800 rounded"><span class="block text-gray-500 capitalize mb-1">${k}</span><span class="${color}">${val}</span></div>`;
        }).join('');
        document.getElementById("sectionQuality").innerHTML = sqHtml;

        document.getElementById("matchedSkills").textContent = (data.matched_skills || []).join(" • ") || "None";
        document.getElementById("missingSkills").textContent = (data.missing_skills || []).join(" • ") || "None";
        
        const recsHtml = (data.recommendations || []).map(r => `<li>${r}</li>`).join("");
        document.getElementById("recommendations").innerHTML = recsHtml || "<li>Looks good!</li>";

      } catch {
        btn.innerHTML = "<span>Scan Resume ✨</span>";
        btn.disabled = false;
        alert("Could not connect to backend. Check backend terminal logs.");
      }
    }
  </script>
</body>
</html>

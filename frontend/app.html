<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATS AI - Resume Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="runtime-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0b0c;
      color: white;
    }
    .bg-glow {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(255,255,255,0.06), transparent 40%);
      z-index: -1;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
    }
    .btn {
      background: white;
      color: black;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 500;
      transition: 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.18);
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="bg-glow"></div>
  <nav class="flex justify-between items-center px-10 py-6">
    <h1 class="text-2xl font-bold">ATS AI - Project</h1>
    <button onclick="logout()" class="text-sm rounded-lg border border-gray-700 px-4 py-2">Logout</button>
  </nav>

  <main class="max-w-4xl mx-auto p-6 space-y-6">
    <h2 class="text-3xl font-bold">Upload Resume</h2>

    <div class="card space-y-5">
    <div class="space-y-3">
      <label class="block text-gray-300">Role</label>
      <select id="role" class="input">
        <option value="">Select role</option>
        <option value="web_developer">Web Developer</option>
        <option value="software_developer">Software Developer</option>
        <option value="data_scientist">Data Scientist</option>
      </select>
    </div>

    <div class="space-y-3">
      <label class="block text-gray-300">Job Description (optional custom JD)</label>
      <textarea id="jd" rows="4" class="input"
        placeholder="Paste JD if you want custom JD matching..."></textarea>
    </div>

    <input id="resume" type="file" accept=".pdf" class="block w-full text-sm text-gray-200">

    <button onclick="analyze()"
      class="btn w-full">Analyze Resume</button>
    </div>

    <section id="result" class="hidden card space-y-4">
      <h3 class="text-2xl font-bold">Analysis Result</h3>
      <p><strong>ATS Score:</strong> <span id="atsScore"></span></p>
      <p><strong>JD Match:</strong> <span id="jdMatch"></span></p>
      <p><strong>Section Quality:</strong> <span id="sectionQuality"></span></p>
      <p><strong>Matched Skills:</strong> <span id="matchedSkills"></span></p>
      <p><strong>Missing Skills:</strong> <span id="missingSkills"></span></p>
      <p><strong>Recommendations:</strong> <span id="recommendations"></span></p>
    </section>
  </main>

  <script>
    function getApiBase() {
      if (window.RUNTIME_CONFIG && window.RUNTIME_CONFIG.API_BASE) {
        return window.RUNTIME_CONFIG.API_BASE;
      }
      const host = window.location.hostname;
      const safeHost = (!host || host === "0.0.0.0" || host === "::") ? "127.0.0.1" : host;
      return `${window.location.protocol}//${safeHost}:8000`;
    }
    const API_BASE = getApiBase();

    const userId = localStorage.getItem("ats_user_id");
    if (!userId) {
      window.location.href = "index.html";
    }

    function logout() {
      localStorage.removeItem("ats_user_id");
      localStorage.removeItem("ats_username");
      window.location.href = "index.html";
    }

    async function analyze() {
      const role = document.getElementById("role").value;
      const jd = document.getElementById("jd").value;
      const file = document.getElementById("resume").files[0];

      if (!role || !file) {
        alert("Please select a role and upload a PDF.");
        return;
      }

      const formData = new FormData();
      formData.append("role", role);
      formData.append("user_id", userId);
      formData.append("job_description", jd);
      formData.append("file", file);

      try {
        const res = await fetch(`${API_BASE}/api/analyze`, {
          method: "POST",
          body: formData
        });
        const data = await res.json();

        if (!res.ok) {
          alert(data.detail || "Analysis failed.");
          return;
        }

        document.getElementById("result").classList.remove("hidden");
        document.getElementById("atsScore").textContent = `${data.ats_score}%`;
        document.getElementById("jdMatch").textContent = `${data.jd_match}%`;
        document.getElementById("sectionQuality").textContent = JSON.stringify(data.section_quality);
        document.getElementById("matchedSkills").textContent = (data.matched_skills || []).join(", ") || "None";
        document.getElementById("missingSkills").textContent = (data.missing_skills || []).join(", ") || "None";
        document.getElementById("recommendations").textContent = (data.recommendations || []).join(" | ");
      } catch {
        alert("Could not connect to backend. Check backend terminal logs.");
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup - ATS AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="api.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #0b0b0c;
  color: white;
}

.bg-glow {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 70% 30%, rgba(59,130,246,0.1), transparent 40%);
  z-index: -1;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 32px;
}

.input {
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: white;
  margin-top: 8px;
}

.input:focus {
  outline: none;
  border-color: white;
}

.btn {
  width: 100%;
  background: white;
  color: black;
  padding: 12px;
  border-radius: 10px;
  font-weight: 500;
  transition: 0.2s;
}
.btn:hover {
  transform: translateY(-2px);
}
.btn-blue {
  background: #3b82f6;
  color: white;
}
</style>

</head>

<body>

<div class="bg-glow"></div>

<div class="min-h-screen flex items-center justify-center px-6">

  <div class="card w-full max-w-md">

    <h2 class="text-2xl font-semibold mb-2 text-center">Create Account</h2>
    <p class="text-gray-400 text-center mb-8">Join ATS AI today</p>

    <div id="step1">
      <div class="mb-4">
        <label class="text-sm text-gray-400">First Name</label>
        <input type="text" id="fname" class="input" placeholder="First Name">
      </div>

      <div class="mb-4">
        <label class="text-sm text-gray-400">Last Name</label>
        <input type="text" id="lname" class="input" placeholder="Last Name">
      </div>

      <div class="mb-6">
        <label class="text-sm text-gray-400">Email Address</label>
        <input type="email" id="email" class="input" placeholder="Username">
      </div>

      <button onclick="sendVerification()" class="btn btn-blue">Continue</button>
    </div>

    <div id="step2" class="hidden">
      <div class="text-center mb-6">
        <span class="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-xs font-semibold">Email Verified</span>
      </div>

      <div class="mb-6">
        <label class="text-sm text-gray-400">Set Password</label>
        <input type="password" id="password" class="input" placeholder="••••••••">
      </div>

      <button onclick="setPassword()" class="btn">Complete Signup</button>
    </div>

    <div class="text-center mt-6 text-sm text-gray-400">
      Already have an account?
      <a href="login.html" class="text-white underline">Login</a>
    </div>

  </div>

</div>

<script>
async function sendVerification() {
  const email = document.getElementById("email").value;
  const fname = document.getElementById("fname").value;
  if (!email || !fname) { alert("Please fill in required fields"); return; }
  
  window._signupUsername = email;
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

async function setPassword() {
  const password = document.getElementById("password").value;
  if (!password) { alert("Please set a password"); return; }

  try {
    await apiCall("/api/auth/register", { 
        method: "POST", 
        body: { 
            username: window._signupUsername, 
            password: password 
        } 
    });
    alert("Signup successful! Please login.");
    window.location.href = "login.html";
  } catch (err) {
    alert(err.message);
  }
}
</script>

</body>
</html>

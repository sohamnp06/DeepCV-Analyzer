<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ATS AI - Resume Screening</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #0b0b0c;
  color: white;
  margin: 0;
  overflow-x: hidden;
}

/* 🔥 THE ORIGINAL BLUE GRID UI 🔥 */
.hero-grid {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: -1;
}
.hero-grid::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background-image:
    linear-gradient(rgba(59,130,246,0.35) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.35) 1px, transparent 1px);
  background-size: 30px 30px;
  filter: drop-shadow(0 0 10px rgba(59,130,246,0.5));
  animation: bgMove 20s infinite linear;
}
@keyframes bgMove {
  from { transform: translate(0,0); }
  to { transform: translate(-30px,-30px); }
}

/* Glass Navbar */
nav.custom-nav {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 1000px;
  z-index: 100;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding-top: 100px;
}

.btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  color: white;
  padding: 14px 28px;
  border-radius: 10px;
  font-weight: 500;
  transition: 0.2s;
  cursor: pointer;
}
.btn:hover {
  background: rgba(255,255,255,0.15);
  transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="hero-grid"></div>

<!-- NAVBAR -->
<nav class="custom-nav">
  <h1 class="text-lg font-semibold">पाशिळकरांचा वाघ Resume Screening</h1>
  <div class="hidden md:flex space-x-8 text-sm text-gray-300">
    <a href="#features" class="hover:text-white transition">Features</a>
    <a href="#how" class="hover:text-white transition">How it works</a>
    <a href="#contact" class="hover:text-white transition">Contact</a>
    <a href="login.html" class="hover:text-white transition">Login</a>
  </div>
</nav>

<!-- HERO -->
<section id="hero" class="relative px-6">
  <div class="max-w-4xl">
    <h1 class="text-5xl md:text-7xl font-bold mb-8 tracking-tight leading-tight">
      Discover Your Ideal <br> Candidates. Fast.
    </h1>
    <p class="text-gray-400 text-lg md:text-xl mb-12 max-w-2xl mx-auto leading-relaxed">
      AI-powered resume screening that helps you analyze, score, and hire smarter.
    </p>

    <div class="flex gap-4 justify-center">
      <a href="signup.html"><button class="btn">Get Started</button></a>
      <a href="login.html"><button class="btn">Login</button></a>
    </div>
  </div>
</section>

</body>
</html>

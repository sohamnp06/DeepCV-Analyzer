<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATS AI - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-black via-gray-900 to-gray-950 text-white min-h-screen">
  <nav class="flex justify-between items-center px-10 py-5 border-b border-gray-800">
    <h1 class="text-2xl font-bold">ATS AI</h1>
    <a href="landing.html" class="text-gray-300 hover:text-white">Back to Landing</a>
  </nav>

  <section class="max-w-xl mx-auto px-6 py-16">
    <h2 class="text-4xl font-bold mb-3 text-center">Login or Register</h2>
    <p class="text-gray-400 text-center mb-8">Continue to upload and analyze resumes.</p>

    <div class="bg-gray-900/70 border border-gray-800 rounded-2xl p-6 space-y-4">
      <input id="username" type="text" placeholder="Username"
        class="w-full p-3 rounded-xl bg-black border border-gray-700">
      <input id="password" type="password" placeholder="Password"
        class="w-full p-3 rounded-xl bg-black border border-gray-700">

      <div class="grid grid-cols-2 gap-3">
        <button onclick="auth('login')"
          class="bg-white text-black py-3 rounded-xl font-semibold hover:opacity-90">Login</button>
        <button onclick="auth('register')"
          class="bg-gray-800 text-white py-3 rounded-xl font-semibold border border-gray-700">Sign Up</button>
      </div>

      <p id="message" class="text-sm text-center text-gray-300"></p>
    </div>
  </section>

  <script>
    const API_BASE = "http://127.0.0.1:8000";

    async function auth(mode) {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const message = document.getElementById("message");

      if (!username || !password) {
        message.textContent = "Username and password are required.";
        return;
      }

      const formData = new FormData();
      formData.append("username", username);
      formData.append("password", password);

      try {
        const res = await fetch(`${API_BASE}/api/auth/${mode}`, {
          method: "POST",
          body: formData
        });
        const data = await res.json();

        if (!res.ok) {
          message.textContent = data.detail || "Authentication failed.";
          return;
        }

        localStorage.setItem("ats_user_id", data.user_id);
        localStorage.setItem("ats_username", data.username);
        window.location.href = "app.html";
      } catch {
        message.textContent = "Backend is not reachable. Start server first.";
      }
    }
  </script>
</body>
</html>

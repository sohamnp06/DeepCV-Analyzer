<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATS AI - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="runtime-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0b0c;
      color: white;
    }
    .bg-glow {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(255,255,255,0.06), transparent 40%);
      z-index: -1;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
    }
    .btn {
      background: white;
      color: black;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 500;
      transition: 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.18);
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="bg-glow"></div>
  <nav class="flex justify-between items-center px-10 py-6">
    <h1 class="text-2xl font-bold">ATS AI</h1>
    <a href="landing.html" class="text-gray-300 hover:text-white">Back to Landing</a>
  </nav>

  <section class="max-w-xl mx-auto px-6 py-16">
    <h2 class="text-4xl font-bold mb-3 text-center">Login or Register</h2>
    <p class="text-gray-400 text-center mb-8">Continue to upload and analyze resumes.</p>

    <div class="card space-y-4">
      <input id="username" type="text" placeholder="Username"
        class="input">
      <input id="password" type="password" placeholder="Password"
        class="input">

      <div class="grid grid-cols-2 gap-3">
        <button onclick="auth('login')"
          class="btn w-full">Login</button>
        <button onclick="auth('register')"
          class="w-full rounded-xl border border-gray-700 py-3 font-semibold">Sign Up</button>
      </div>

      <p id="status" class="text-sm text-center text-gray-400"></p>
      <p id="message" class="text-sm text-center text-gray-300"></p>
    </div>
  </section>

  <script>
    function getApiBase() {
      if (window.RUNTIME_CONFIG && window.RUNTIME_CONFIG.API_BASE) {
        return window.RUNTIME_CONFIG.API_BASE;
      }
      const host = window.location.hostname;
      const safeHost = (!host || host === "0.0.0.0" || host === "::") ? "127.0.0.1" : host;
      return `${window.location.protocol}//${safeHost}:8000`;
    }
    const API_BASE = getApiBase();
    const statusEl = document.getElementById("status");

    async function checkHealth() {
      try {
        const res = await fetch(`${API_BASE}/api/health`);
        const data = await res.json();
        if (data.db_ready) {
          statusEl.textContent = "Backend and database are ready.";
        } else {
          statusEl.textContent = "Backend is running, but database is not ready.";
        }
      } catch {
        statusEl.textContent = "Backend is not running on port 8000.";
      }
    }

    async function auth(mode) {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const message = document.getElementById("message");

      if (!username || !password) {
        message.textContent = "Username and password are required.";
        return;
      }

      const formData = new FormData();
      formData.append("username", username);
      formData.append("password", password);

      try {
        const res = await fetch(`${API_BASE}/api/auth/${mode}`, {
          method: "POST",
          body: formData
        });
        const data = await res.json();

        if (!res.ok) {
          message.textContent = data.detail || "Authentication failed.";
          return;
        }

        localStorage.setItem("ats_user_id", data.user_id);
        localStorage.setItem("ats_username", data.username);
        window.location.href = "app.html";
      } catch (err) {
        message.textContent = "Backend is not reachable. Check backend terminal logs.";
      }
    }

    checkHealth();
  </script>
</body>
</html>
